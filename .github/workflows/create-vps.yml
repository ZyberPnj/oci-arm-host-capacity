name: Créer VPS Oracle Cloud
on:
  workflow_dispatch:
  schedule:
    - cron: '*/15 * * * *'

jobs:
  create-instance:
    runs-on: ubuntu-latest
    steps:
      - name: Installer OCI CLI
        run: |
          curl -L https://raw.githubusercontent.com/oracle/oci-cli/master/scripts/install/install.sh -o install.sh
          chmod +x install.sh
          ./install.sh --accept-all-defaults
          echo "$HOME/bin" >> $GITHUB_PATH

      - name: Configurer OCI
        run: |
          mkdir -p ~/.oci
          echo "${{ secrets.OCI_PRIVATE_KEY_FILENAME }}" > ~/.oci/key.pem
          echo "" >> ~/.oci/key.pem
          chmod 600 ~/.oci/key.pem

          cat > ~/.oci/config <<EOF
          [DEFAULT]
          user=${{ secrets.OCI_USER_ID }}
          tenancy=${{ secrets.OCI_TENANCY_ID }}
          fingerprint=${{ secrets.OCI_KEY_FINGERPRINT }}
          region=${{ secrets.OCI_REGION }}
          key_file=~/.oci/key.pem
          EOF
          chmod 600 ~/.oci/config

      - name: Vérifier si une instance existe déjà
        id: check_instance
        run: |
          COMP=$(echo -n "${{ secrets.OCI_COMPARTMENT_OCID }}" | tr -d '\n' | tr -d ' ')

          EXISTING=$(oci compute instance list \
            --compartment-id "$COMP" \
            --lifecycle-state RUNNING \
            --query "data[?shape=='VM.Standard.A1.Flex'].id" \
            --raw-output 2>/dev/null || echo "")

          if [ -n "$EXISTING" ] && [ "$EXISTING" != "[]" ]; then
            echo "Une instance A1.Flex existe déjà, on arrête ici."
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "Aucune instance A1.Flex existante, on continue."
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Créer l'instance (avec gestion capacité multi-AD)
        if: steps.check_instance.outputs.skip == 'false'
        env:
          SUPPRESS_LABEL_WARNING: "True"
        run: |
          COMP=$(echo -n "${{ secrets.OCI_COMPARTMENT_OCID }}" | tr -d '\n' | tr -d ' ')
          IMG=$(echo -n "${{ secrets.OCI_IMAGE_ID }}" | tr -d '\n' | tr -d ' ')
          SUBNET=$(echo -n "${{ secrets.OCI_SUBNET_ID }}" | tr -d '\n' | tr -d ' ')
          SSH=$(echo -n "${{ secrets.OCI_SSH_PUBLIC_KEY }}" | tr -d '\n')

          echo "{\"ssh_authorized_keys\":\"${SSH}\"}" > metadata.json
          echo '{"ocpus":4,"memoryInGBs":24}' > shape.json

          echo "=== Contenu metadata.json ==="
          cat metadata.json
          echo "=== Contenu shape.json ==="
          cat shape.json

          echo "=== Récupération des Availability Domains ==="
          ADS=$(oci iam availability-domain list \
            --compartment-id "$COMP" \
            --query "data[].name" \
            --raw-output | tr -d '[]"' | tr ',' '\n')

          echo "AD trouvés :"
          echo "$ADS"

          SUCCESS=false

          for AD in $ADS; do
            AD_CLEAN=$(echo -n "$AD" | tr -d ' ')
            echo "=== Tentative sur AD: $AD_CLEAN ==="

            set +e
            OUTPUT=$(oci compute instance launch \
              --availability-domain "$AD_CLEAN" \
              --compartment-id "$COMP" \
              --shape "VM.Standard.A1.Flex" \
              --shape-config file://shape.json \
              --image-id "$IMG" \
              --subnet-id "$SUBNET" \
              --assign-public-ip true \
              --boot-volume-size-in-gbs 100 \
              --metadata file://metadata.json 2>&1)
            EXIT_CODE=$?
            set -e

            echo "$OUTPUT"

            if [ $EXIT_CODE -eq 0 ]; then
              echo "✅ Instance créée avec succès sur $AD_CLEAN !"
              SUCCESS=true
              break
            elif echo "$OUTPUT" | grep -q "Out of host capacity"; then
              echo "⚠️ Pas de capacité sur $AD_CLEAN, on essaie l'AD suivant..."
              continue
            else
              echo "❌ Erreur différente de 'Out of host capacity', arrêt."
              exit 1
            fi
          done

          if [ "$SUCCESS" = false ]; then
            echo "Aucune capacité disponible sur aucun AD pour ce run. On réessaiera au prochain cron."
            exit 0
          fi
